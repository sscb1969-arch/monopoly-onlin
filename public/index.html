<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 class="title">
  🎲 オンラインモノポリー風ゲーム
</h2>

<div class="panel join-box">
  <h3>ルームに参加</h3>
  <input id="room" placeholder="ルームID">
  <input id="name" placeholder="名前">
  <button onclick="joinGame()">参加</button>
</div>

<div class="panel control-box">
  <button onclick="rollDice()">🎲 サイコロを振る</button>
</div>

<div class="panel">
  <h3>📍 盤面</h3>
  <div id="board"></div>
</div>

<div class="panel">
  <h3>👤 プレイヤー</h3>
  <div id="players"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
