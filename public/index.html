<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>オンラインモノポリー風ゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="join-box panel">
  <h3>ルーム参加</h3>
  <input id="room" placeholder="ルームID">
  <input id="name" placeholder="名前">
  <button onclick="joinGame()">参加</button>
</div>

<div class="panel">
  <h3>🎲 サイコロ</h3>
  <div id="dice" class="dice"></div>
  <div id="dice-result"></div>
  <audio id="dice-sound" src="dice.mp3"></audio>
  <button onclick="rollDice()">サイコロを振る</button>
</div>

<div class="panel">
  <h3>📍 盤面</h3>
  <div class="board-square">
    <div id="board"></div>
    <div id="players-center" class="players-center"></div>
  </div>
</div>

<div class="panel">
  <h3>📢 メッセージ</h3>
  <div id="message-box">まだメッセージはありません</div>
</div>

<div id="choice-box" class="panel"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
