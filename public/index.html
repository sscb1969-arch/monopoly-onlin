<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>オンラインモノポリー風ゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="join-box panel">
  <h3>ルーム参加</h3>
  <input id="room" placeholder="ルームID">
  <input id="name" placeholder="名前">
  <button onclick="joinGame()">参加</button>
</div>

<div class="panel">
  <h3>🎲 サイコロ</h3>
  <div id="dice" class="dice"></div>
  <div id="dice-result"></div>
  <audio id="dice-sound" src="dice.mp3"></audio>
  <button id="roll-button" onclick="rollDice()">サイコロを振る</button>
</div>

<div class="panel">
  <h3>📍 盤面</h3>
  <div class="board-square">
    <div id="board"></div>
    <div id="player-layer"></div>
    <div id="players-center" class="players-center"></div>
  </div>
</div>

<div class="panel">
  <h3>📢 メッセージ</h3>
  <div id="message-box">まだメッセージはありません</div>
</div>

<div id="choice-box" class="panel"></div>

<!-- 左チャット（縮小可能） -->
<div id="chat-panel" class="side-panel left">
  <button class="toggle-btn" onclick="togglePanel('chat-panel')">◀</button>
  <h3>💬 チャット</h3>
  <div id="chat-box" class="chat-box"></div>
  <input id="chat-input" placeholder="メッセージ">
  <button onclick="sendChat()">送信</button>
</div>

<!-- 右ルール（縮小可能） -->
<div id="rules-panel" class="side-panel right">
  <button class="toggle-btn" onclick="togglePanel('rules-panel')">▶</button>
  <h3>📘 ルール</h3>
  <ul>
    <li>GOを通過すると +200</li>
    <li>他人の物件に止まると家賃を支払う</li>
    <li>同色コンプリートで家賃2倍</li>
    <li>家を建てると家賃アップ</li>
    <li>チャンス・コミュニティでイベント発生</li>
  </ul>
</div>

<script>
function togglePanel(id) {
  const panel = document.getElementById(id);
  panel.classList.toggle("collapsed");
}
</script>
